services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: servervault-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - servervault
    environment:
      - APP_NAME=${APP_NAME}
      - APP_ENV=${APP_ENV}
      - APP_KEY=${APP_KEY}
      - APP_DEBUG=${APP_DEBUG}
      - APP_URL=${APP_URL}
      - DB_CONNECTION=${DB_CONNECTION}
      - DB_HOST=db
      - DB_PORT=${DB_PORT}
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_PORT=${REDIS_PORT}
      - CACHE_STORE=${CACHE_STORE}
      - QUEUE_CONNECTION=${QUEUE_CONNECTION}
      - SESSION_DRIVER=${SESSION_DRIVER}
      - BROADCAST_CONNECTION=${BROADCAST_CONNECTION}
      - REVERB_APP_ID=${REVERB_APP_ID}
      - REVERB_APP_KEY=${REVERB_APP_KEY}
      - REVERB_APP_SECRET=${REVERB_APP_SECRET}
      - REVERB_HOST=${REVERB_HOST}
      - REVERB_PORT=${REVERB_PORT}
      - REVERB_SCHEME=${REVERB_SCHEME}
      - SSH_BRIDGE_WS_URL=${SSH_BRIDGE_WS_URL:-ws://localhost:8090}
      - SSH_BRIDGE_INTERNAL_SECRET=${SSH_BRIDGE_INTERNAL_SECRET}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    container_name: servervault-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-9002}:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - servervault
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: mysql:8
    container_name: servervault-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - dbdata:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - servervault
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: servervault-redis
    restart: unless-stopped
    command: redis-server ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - servervault
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  reverb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: servervault-reverb
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    command: php artisan reverb:start --host=0.0.0.0 --port=8080 --debug
    ports:
      - "8080:8080"
    networks:
      - servervault
    environment:
      - APP_NAME=${APP_NAME}
      - APP_ENV=${APP_ENV}
      - APP_KEY=${APP_KEY}
      - REVERB_APP_ID=${REVERB_APP_ID}
      - REVERB_APP_KEY=${REVERB_APP_KEY}
      - REVERB_APP_SECRET=${REVERB_APP_SECRET}
      - REVERB_HOST=0.0.0.0
      - REVERB_PORT=8080
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_PORT=${REDIS_PORT}
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php artisan reverb:ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  guacd:
    image: guacamole/guacd:latest
    container_name: servervault-guacd
    restart: unless-stopped
    networks:
      - servervault
    expose:
      - "4822"

  guacd-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: servervault-guacd-proxy
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    command: php bridge/guacd-proxy.php
    networks:
      - servervault
    environment:
      - APP_URL=http://nginx:80
      - BRIDGE_HOST=0.0.0.0
      - BRIDGE_PORT=8091
      - GUACD_HOST=guacd
      - GUACD_PORT=4822
      - INTERNAL_SECRET=${SSH_BRIDGE_INTERNAL_SECRET}
    depends_on:
      app:
        condition: service_healthy
      guacd:
        condition: service_started

  ssh-bridge:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: servervault-ssh-bridge
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    command: php bridge/server.php
    ports:
      - "${SSH_BRIDGE_PORT:-8090}:8090"
    networks:
      - servervault
    environment:
      - APP_URL=http://nginx:80
      - BRIDGE_HOST=0.0.0.0
      - BRIDGE_PORT=8090
      - INTERNAL_SECRET=${SSH_BRIDGE_INTERNAL_SECRET}
    depends_on:
      app:
        condition: service_healthy

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: servervault-queue
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=300
    networks:
      - servervault
    environment:
      - APP_NAME=${APP_NAME}
      - APP_ENV=${APP_ENV}
      - APP_KEY=${APP_KEY}
      - DB_CONNECTION=${DB_CONNECTION}
      - DB_HOST=db
      - DB_PORT=${DB_PORT}
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_PORT=${REDIS_PORT}
      - QUEUE_CONNECTION=${QUEUE_CONNECTION}
      - BROADCAST_CONNECTION=${BROADCAST_CONNECTION}
      - REVERB_APP_ID=${REVERB_APP_ID}
      - REVERB_APP_KEY=${REVERB_APP_KEY}
      - REVERB_APP_SECRET=${REVERB_APP_SECRET}
      - REVERB_HOST=reverb
      - REVERB_PORT=${REVERB_PORT}
      - REVERB_SCHEME=${REVERB_SCHEME}
    depends_on:
      app:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      reverb:
        condition: service_started

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: servervault-scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    command: php artisan schedule:work
    networks:
      - servervault
    environment:
      - APP_NAME=${APP_NAME}
      - APP_ENV=${APP_ENV}
      - APP_KEY=${APP_KEY}
      - DB_CONNECTION=${DB_CONNECTION}
      - DB_HOST=db
      - DB_PORT=${DB_PORT}
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_PORT=${REDIS_PORT}
      - QUEUE_CONNECTION=${QUEUE_CONNECTION}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

networks:
  servervault:
    driver: bridge

volumes:
  dbdata:
  redisdata:
